services:
  postgres:
    image: postgres:16-alpine
    container_name: secondhand-student-shop-postgres
    environment:
      POSTGRES_DB: student_shop
      POSTGRES_USER: student_shop_user
      POSTGRES_PASSWORD: student_shop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_shop_user -d student_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
